[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
  "forge-std/=lib/forge-std/src/"
]
gas_reports = ["VaultReputation"]
fs_permissions = [{ access = "read-write", path = "./deployments.json" }]

[profile.ci]
verbosity = 3
fuzz = { runs = 256 }

[rpc_endpoints]
base = "${VAULT_BASE_RPC_URL}"
base_sepolia = "${VAULT_BASE_SEPOLIA_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
